<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Reflection Sessions</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .session-list, .reflection-list { margin: 24px 0; }
    .session-item, .reflection-item { cursor: pointer; padding: 8px 12px; border-radius: 6px; margin-bottom: 6px; background: #f3f4f6; transition: background 0.2s; }
    .session-item:hover, .reflection-item:hover { background: #e5e7eb; }
    .section-title { font-size: 20px; font-weight: 600; margin-top: 24px; }
    .audio-controls { display: flex; align-items: center; gap: 12px; }
    .audio-time { font-size: 13px; color: #888; min-width: 90px; display: inline-block; }
    .audio-bar-wrap { position: relative; flex: 1; height: 28px; display: flex; align-items: center; }
    .audio-region-layer {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 10px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: #f3f4f6;
      overflow: hidden;
      pointer-events: none;
    }
    .audio-tooltip {
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      transform: translateX(-50%);
      padding: 6px 8px;
      border-radius: 6px;
      background: rgba(17, 24, 39, 0.92);
      color: #fff;
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
    }
    .audio-tooltip.is-visible {
      opacity: 1;
    }
    .audio-region {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 999px;
    }
    .audio-region-unknown { background: rgba(107, 114, 128, 0.32); }
    .audio-region-unclear-feedback { background: rgba(239, 68, 68, 0.38); }
    .audio-region-unclear-concerns { background: rgba(245, 158, 11, 0.4); }
    .audio-region-intensity { background: rgba(59, 130, 246, 0.4); }
    .audio-region-goal-tone { background: rgba(34, 197, 94, 0.38); }
    .audio-region:hover { filter: brightness(0.95); }
    .audio-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-top: 10px;
      font-size: 12px;
      color: #4b5563;
    }
    .audio-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .audio-legend-swatch {
      width: 10px;
      height: 10px;
      border-radius: 999px;
    }
    .audio-slider {
      position: relative;
      z-index: 1;
      width: 100%;
      margin: 0;
      background: transparent;
      -webkit-appearance: none;
      appearance: none;
    }
    .audio-slider:disabled { cursor: not-allowed; opacity: 0.75; }
    .audio-slider::-webkit-slider-runnable-track {
      height: 10px;
      background: transparent;
      border-radius: 999px;
    }
    .audio-slider::-moz-range-track {
      height: 10px;
      background: transparent;
      border-radius: 999px;
    }
    .audio-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 24px;
      margin-top: -7px;
      border: 0;
      border-radius: 999px;
      background: #6366f1;
      cursor: pointer;
    }
    .audio-slider::-moz-range-thumb {
      width: 12px;
      height: 24px;
      border: 0;
      border-radius: 999px;
      background: #6366f1;
      cursor: pointer;
    }
    .reflection-modal[hidden] { display: none; }
    .reflection-modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, 0.45);
    }
    .reflection-modal-dialog {
      width: min(560px, 100%);
      max-height: 80vh;
      overflow: auto;
      padding: 24px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.22);
    }
    .reflection-modal-header {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .reflection-modal-title {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
    }
    .reflection-modal-subtitle {
      margin: 4px 0 0;
      font-size: 12px;
      color: #6b7280;
    }
    .reflection-modal-close {
      border: 0;
      border-radius: 10px;
      background: #f3f4f6;
      padding: 8px 10px;
      cursor: pointer;
    }
    .reflection-node-type {
      display: inline-block;
      margin-bottom: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 12px;
      font-weight: 600;
      text-transform: capitalize;
    }
    .reflection-node-text {
      margin: 0 0 20px;
      font-size: 15px;
      line-height: 1.6;
      color: #111827;
      white-space: pre-wrap;
    }
    .reflection-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .reflection-option {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border: 1px solid #dbe3ff;
      border-radius: 12px;
      background: #f8faff;
      cursor: pointer;
    }
    .reflection-option:hover {
      background: #eef2ff;
    }
    .reflection-option-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #111827;
    }
    .reflection-option-next {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      color: #6b7280;
    }
    .reflection-terminal {
      padding: 12px 14px;
      border-radius: 12px;
      background: #f9fafb;
      color: #4b5563;
      font-size: 13px;
    }
  </style>
</head>
{% set resolved_user = current_user or '' %}
<body data-current-user="{{ resolved_user }}">
  <div style="max-width: 600px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 32px;">
    <h1>User Reflection Sessions</h1>
    <div style="margin-bottom: 16px; color: #6b7280; font-size: 14px;">Viewing sessions for <strong>{{ resolved_user }}</strong></div>
    <div class="session-list" id="sessionList"></div>
    <div id="waveformContainer" style="margin:24px 0;"></div>
    <div class="reflection-list" id="reflectionList"></div>
  </div>
  <div id="reflectionModal" class="reflection-modal" hidden>
    <div class="reflection-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="reflectionModalTitle">
      <div class="reflection-modal-header">
        <div>
          <h2 id="reflectionModalTitle" class="reflection-modal-title">Reflection Tree</h2>
          <p id="reflectionModalSubtitle" class="reflection-modal-subtitle"></p>
        </div>
        <button id="reflectionModalClose" class="reflection-modal-close" type="button">Close</button>
      </div>
      <div id="reflectionModalBody"></div>
    </div>
  </div>
  <script>

    const sessionList = document.getElementById('sessionList');
    const reflectionList = document.getElementById('reflectionList');
    const waveformContainer = document.getElementById('waveformContainer');
    const currentUser = document.body.dataset.currentUser || '';
    const reflectionModal = document.getElementById('reflectionModal');
    const reflectionModalTitle = document.getElementById('reflectionModalTitle');
    const reflectionModalSubtitle = document.getElementById('reflectionModalSubtitle');
    const reflectionModalBody = document.getElementById('reflectionModalBody');
    const reflectionModalClose = document.getElementById('reflectionModalClose');
    let activeReflectionState = null;

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function closeReflectionModal() {
      reflectionModal.hidden = true;
      reflectionModalBody.innerHTML = '';
      activeReflectionState = null;
    }

    function renderReflectionModalNode() {
      if (!activeReflectionState) {
        closeReflectionModal();
        return;
      }

      const { reflection, tree, currentNodeId } = activeReflectionState;
      const node = tree?.nodes?.[currentNodeId];
      if (!node) {
        reflectionModalBody.innerHTML = '<div class="reflection-terminal">This reflection node could not be loaded.</div>';
        return;
      }

      const options = Array.isArray(node.options) ? node.options : [];
      reflectionModalTitle.textContent = reflection.tree_id || 'Reflection Tree';
      reflectionModalSubtitle.textContent = reflection.reflection_tree_file || '';

      reflectionModalBody.innerHTML = `
        <div class="reflection-node-type">${escapeHtml(node.type || node.node_type || 'node')}</div>
        <p class="reflection-node-text">${escapeHtml(node.text || '')}</p>
        <div class="reflection-options">
          ${options.length ? options.map((option, index) => {
            const label = option.label || option.value || `Option ${index + 1}`;
            const next = option.next || '';
            return `<button class="reflection-option" type="button" data-next="${escapeHtml(next)}">
              <span class="reflection-option-label">${escapeHtml(label)}</span>
              ${next ? `<span class="reflection-option-next">Next: ${escapeHtml(next)}</span>` : ''}
            </button>`;
          }).join('') : '<div class="reflection-terminal">No further options for this node.</div>'}
        </div>
      `;

      reflectionModalBody.querySelectorAll('.reflection-option').forEach(button => {
        button.addEventListener('click', () => {
          const nextNodeId = button.dataset.next;
          if (!nextNodeId || !tree?.nodes?.[nextNodeId]) {
            return;
          }
          activeReflectionState.currentNodeId = nextNodeId;
          renderReflectionModalNode();
        });
      });
    }

    function openReflectionModal(reflection) {
      const tree = reflection.tree;
      const startNodeId = tree?.start_node;
      if (!tree || !startNodeId || !tree.nodes?.[startNodeId]) {
        return;
      }

      activeReflectionState = {
        reflection,
        tree,
        currentNodeId: startNodeId,
      };
      reflectionModal.hidden = false;
      renderReflectionModalNode();
    }

    reflectionModalClose.addEventListener('click', closeReflectionModal);
    reflectionModal.addEventListener('click', event => {
      if (event.target === reflectionModal) {
        closeReflectionModal();
      }
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && !reflectionModal.hidden) {
        closeReflectionModal();
      }
    });

    async function loadSessions() {
      sessionList.innerHTML = '';
      reflectionList.innerHTML = '';
      waveformContainer.innerHTML = '';
      const user = (currentUser || '').trim();
      if (!user) {
        sessionList.innerHTML = '<div>No user selected.</div>';
        return;
      }
      const res = await fetch(`/reflection/${encodeURIComponent(user)}`);
      const data = await res.json();
      if (!data.session_names.length) {
        sessionList.innerHTML = '<div>No sessions found for this user.</div>';
        return;
      }
      sessionList.innerHTML = '<div class="section-title">Sessions</div>' + data.session_names.map(s => `<div class="session-item" data-session="${s}">${s}</div>`).join('');
      document.querySelectorAll('.session-item').forEach(item => {
        item.onclick = () => loadReflections(user, item.dataset.session);
      });
    }

    async function loadReflections(user, session) {
      reflectionList.innerHTML = '';
      waveformContainer.innerHTML = '';
      const audioUrl = `/recording/${encodeURIComponent(session)}`;
      const reflectionsResponse = await fetch(`/reflection/${encodeURIComponent(user)}/${encodeURIComponent(session)}`);
      const reflectionData = await reflectionsResponse.json();
      const reflections = reflectionData.reflections || [];

      const treeTypeMeta = {
        unknown: { label: 'Unknown', className: 'audio-region-unknown', color: 'rgba(107, 114, 128, 0.32)' },
        unclear_feedback: { label: 'Unclear Feedback', className: 'audio-region-unclear-feedback', color: 'rgba(239, 68, 68, 0.38)' },
        unclear_concerns: { label: 'Unclear Concerns', className: 'audio-region-unclear-concerns', color: 'rgba(245, 158, 11, 0.4)' },
        intensity: { label: 'Intensity Mismatch', className: 'audio-region-intensity', color: 'rgba(59, 130, 246, 0.4)' },
        goal_tone: { label: 'Goal/Tone Incoherence', className: 'audio-region-goal-tone', color: 'rgba(34, 197, 94, 0.38)' },
      };

      function getTreeTypeKey(treeId) {
        if (!treeId) return 'unknown';
        if (treeId.startsWith('unclear_feedback')) return 'unclear_feedback';
        if (treeId.startsWith('unclear_concerns')) return 'unclear_concerns';
        if (treeId.startsWith('intensity_')) return 'intensity';
        if (treeId.includes('outcome') || treeId.includes('tone')) return 'goal_tone';
        return 'unknown';
      }

      const reflectionsWithTypes = await Promise.all(reflections.map(async reflection => {
        const nextReflection = { ...reflection, tree_id: null, treeTypeKey: 'unknown', tree: null };
        if (!reflection.reflection_tree_file) {
          return nextReflection;
        }

        try {
          const treeResponse = await fetch(`/reflection_tree/${encodeURIComponent(reflection.reflection_tree_file)}`);
          if (!treeResponse.ok) {
            return nextReflection;
          }

          const treeData = await treeResponse.json();
          nextReflection.tree = treeData;
          nextReflection.tree_id = treeData.tree_id || null;
          nextReflection.treeTypeKey = getTreeTypeKey(nextReflection.tree_id);
        } catch (error) {
          console.warn('Failed to load reflection tree', reflection.reflection_tree_file, error);
        }

        return nextReflection;
      }));

      waveformContainer.innerHTML = `
        <div class="section-title">Audio</div>
        <div class="audio-controls">
          <button id="playBtn" disabled>Play</button>
          <span id="audioTime" class="audio-time">0:00 / --:--</span>
          <div class="audio-bar-wrap">
            <div id="audioRegionLayer" class="audio-region-layer"></div>
            <input id="audioSlider" class="audio-slider" type="range" min="0" max="0" step="0.01" value="0" disabled />
            <div id="audioTooltip" class="audio-tooltip"></div>
          </div>
        </div>
        <div id="audioLegend" class="audio-legend"></div>
      `;

      const playBtn = document.getElementById('playBtn');
      const audioTime = document.getElementById('audioTime');
      const audioSlider = document.getElementById('audioSlider');
      const audioRegionLayer = document.getElementById('audioRegionLayer');
      const audioLegend = document.getElementById('audioLegend');
      const audioTooltip = document.getElementById('audioTooltip');
      const audioBarWrap = audioSlider.parentElement;
      const audio = new Audio(audioUrl);
      audio.preload = 'metadata';
      let duration = 0;

      function formatTime(s) {
        if (!Number.isFinite(s)) return '--:--';
        s = Math.floor(s);
        return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
      }

      function renderRegions() {
        if (!Number.isFinite(duration) || duration <= 0) {
          audioRegionLayer.innerHTML = '';
          return;
        }

        audioRegionLayer.innerHTML = reflectionsWithTypes.map(reflection => {
          const start = Number(reflection.startms) / 1000;
          const end = Number(reflection.endms) / 1000;
          if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) {
            return '';
          }

          const left = Math.max(0, Math.min(100, (start / duration) * 100));
          const width = Math.max(0.5, Math.min(100 - left, ((end - start) / duration) * 100));
          const treeType = treeTypeMeta[reflection.treeTypeKey] || treeTypeMeta.unknown;
          const treeLabel = reflection.tree_id || treeType.label;
          const title = `${treeLabel} (${formatTime(start)} - ${formatTime(end)})`;
          return `<div class="audio-region ${treeType.className}" style="left:${left}%;width:${width}%;" title="${escapeHtml(title)}"></div>`;
        }).join('');
      }

      function renderLegend() {
        const usedTypes = [...new Set(reflectionsWithTypes.map(reflection => reflection.treeTypeKey))]
          .map(typeKey => treeTypeMeta[typeKey] || treeTypeMeta.unknown);

        if (!usedTypes.length) {
          audioLegend.innerHTML = '';
          return;
        }

        audioLegend.innerHTML = usedTypes.map(type => (
          `<span class="audio-legend-item"><span class="audio-legend-swatch" style="background:${type.color};"></span>${escapeHtml(type.label)}</span>`
        )).join('');
      }

      function hideTooltip() {
        audioTooltip.textContent = '';
        audioTooltip.classList.remove('is-visible');
      }

      function showTooltip(x, text) {
        audioTooltip.textContent = text;
        audioTooltip.style.left = `${x}px`;
        audioTooltip.classList.add('is-visible');
      }

      function findReflectionAtTime(timeInSeconds) {
        return reflectionsWithTypes.find(reflection => {
          const start = Number(reflection.startms) / 1000;
          const end = Number(reflection.endms) / 1000;
          return Number.isFinite(start) && Number.isFinite(end) && timeInSeconds >= start && timeInSeconds <= end;
        }) || null;
      }

      function setDuration(nextDuration) {
        if (!Number.isFinite(nextDuration) || nextDuration <= 0) {
          return false;
        }

        duration = nextDuration;
        audioSlider.max = String(duration);
        audioSlider.disabled = false;
        playBtn.disabled = false;
        renderRegions();
        updateUI();
        return true;
      }

      function updateUI() {
        audioTime.textContent = `${formatTime(audio.currentTime)} / ${formatTime(duration)}`;
        audioSlider.value = Number.isFinite(audio.currentTime) ? String(audio.currentTime) : '0';
      }

      async function resolveDuration() {
        if (setDuration(audio.duration)) {
          return;
        }

        try {
          const response = await fetch(audioUrl);
          const audioBuffer = await response.arrayBuffer();
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const decoded = await audioContext.decodeAudioData(audioBuffer.slice(0));
          setDuration(decoded.duration);
          await audioContext.close();
          return;
        } catch (error) {
          console.warn('Falling back to reflection timestamps for duration', error);
        }

        const fallbackDuration = reflectionsWithTypes.reduce((maxEnd, reflection) => {
          const end = Number(reflection.endms) / 1000;
          return Number.isFinite(end) ? Math.max(maxEnd, end) : maxEnd;
        }, 0);
        setDuration(fallbackDuration);
      }

      playBtn.onclick = async () => {
        if (!Number.isFinite(duration) || duration <= 0) {
          return;
        }

        if (audio.paused) {
          try {
            await audio.play();
          } catch (error) {
            console.error('Failed to play audio', error);
          }
        } else {
          audio.pause();
        }
      };

      audio.onplay = () => { playBtn.textContent = 'Pause'; };
      audio.onpause = () => { playBtn.textContent = 'Play'; };
      audio.ontimeupdate = updateUI;
      audio.onended = () => {
        playBtn.textContent = 'Play';
        updateUI();
      };
      audio.onloadedmetadata = async () => {
        if (!setDuration(audio.duration)) {
          await resolveDuration();
        }
      };
      audio.ondurationchange = () => {
        setDuration(audio.duration);
      };

      audioSlider.addEventListener('input', () => {
        if (!Number.isFinite(duration) || duration <= 0) {
          return;
        }

        const nextTime = Number(audioSlider.value);
        if (!Number.isFinite(nextTime)) {
          return;
        }

        audio.currentTime = Math.min(duration, Math.max(0, nextTime));
        updateUI();
      });

      audioBarWrap.addEventListener('mousemove', event => {
        if (!Number.isFinite(duration) || duration <= 0) {
          hideTooltip();
          return;
        }

        const rect = audioBarWrap.getBoundingClientRect();
        const x = Math.max(0, Math.min(rect.width, event.clientX - rect.left));
        const hoveredTime = (x / rect.width) * duration;
        const hoveredReflection = findReflectionAtTime(hoveredTime);

        if (!hoveredReflection) {
          hideTooltip();
          return;
        }

        const treeType = treeTypeMeta[hoveredReflection.treeTypeKey] || treeTypeMeta.unknown;
        const treeLabel = hoveredReflection.tree_id || treeType.label;
        showTooltip(x, treeLabel);
      });

      audioBarWrap.addEventListener('mouseleave', hideTooltip);
      audioBarWrap.addEventListener('click', event => {
        if (!Number.isFinite(duration) || duration <= 0) {
          return;
        }

        const rect = audioBarWrap.getBoundingClientRect();
        const x = Math.max(0, Math.min(rect.width, event.clientX - rect.left));
        const clickedTime = (x / rect.width) * duration;
        const clickedReflection = findReflectionAtTime(clickedTime);

        if (clickedReflection?.tree) {
          openReflectionModal(clickedReflection);
        }
      });

      renderLegend();

      if (!reflectionsWithTypes.length) {
        reflectionList.innerHTML = '<div>No reflections for this session.</div>';
      } else {
        reflectionList.innerHTML = '<div class="section-title">Reflections</div>' + reflectionsWithTypes.map(r => {
          const treeLabel = r.tree_id || 'unknown';
          return `<div class="reflection-item">${escapeHtml(r.reflection_tree_file)} <span style="color:#888;font-size:12px;">[${escapeHtml(r.startms)} - ${escapeHtml(r.endms)}]</span> <span style="color:#6b7280;font-size:12px;">${escapeHtml(treeLabel)}</span></div>`;
        }).join('');
      }

      updateUI();
      await resolveDuration();
    }

    loadSessions();
  </script>
</body>
</html>

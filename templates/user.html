<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Sessions</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .session-list { margin: 24px 0; }
    .session-item { cursor: pointer; padding: 12px 14px; border-radius: 10px; margin-bottom: 8px; background: #f3f4f6; transition: background 0.2s; }
    .session-item:hover { background: #e5e7eb; }
    .section-title { font-size: 20px; font-weight: 600; margin-top: 24px; }
    .back-link { color: #4b5563; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
{% set resolved_user = current_user or '' %}
<body data-current-user="{{ resolved_user }}">
  <div style="max-width: 600px; margin: 40px auto; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 32px;">
    <a class="back-link" href="/login">Back to login</a>
    <h1>User Reflection Sessions</h1>
    <div style="margin-bottom: 16px; color: #6b7280; font-size: 14px;">Viewing sessions for <strong>{{ resolved_user }}</strong></div>
    <div class="session-list" id="sessionList"></div>
  </div>
  <script>
    const sessionList = document.getElementById('sessionList');
    const currentUser = document.body.dataset.currentUser || '';

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function loadSessions() {
      const user = currentUser.trim();
      sessionList.innerHTML = '';

      if (!user) {
        sessionList.innerHTML = '<div>No user selected.</div>';
        return;
      }

      const res = await fetch(`/reflection/${encodeURIComponent(user)}`);
      const data = await res.json();
      if (!data.session_names.length) {
        sessionList.innerHTML = '<div>No sessions found for this user.</div>';
        return;
      }

      sessionList.innerHTML = '<div class="section-title">Sessions</div>' + data.session_names.map(session => (
        `<div class="session-item" data-session="${escapeHtml(session)}">${escapeHtml(session)}</div>`
      )).join('');

      document.querySelectorAll('.session-item').forEach(item => {
        item.addEventListener('click', () => {
          const session = item.dataset.session || '';
          window.location.href = `/${encodeURIComponent(user)}/analysis/${encodeURIComponent(session)}`;
        });
      });
    }

    loadSessions();
  </script>
</body>
</html>

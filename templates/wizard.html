<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reflection Node Interface</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div id="tab-bar">
    <div id="tabs"></div>
    <button id="addTabBtn" class="new-tab-btn">+ New board</button>
  </div>

  <div id="toolbar">
    <button id="addAgentBtn" class="agent-button">Add agent</button>
    <button id="addGoalBtn" class="goal-button">Add goal</button>
    <button id="addBlockerBtn" class="blocker-button">Add blocker</button>
    <button id="addFollowupBtn" class="followup-button">Add action/question</button>
    <button id="playBtn" class="primary">▶</button>
    <div class="hint">Drag cards. Agent → Goal → Blocker → Responsible agent. Hover card edges to show + connectors, then drag to another card to link them.</div>
  </div>

  <div id="canvas">
    <svg id="links"></svg>
  </div>

  <aside id="transcript-sidebar">
    <div class="transcript-sidebar-header">
      <div class="transcript-sidebar-title">Transcript</div>

      <div class="session-name-input">
        <label for="sessionNameInput">Session Name:</label>
        <input id="sessionNameInput" type="text" value="">
      </div>

      <div class="transcript-sidebar-controls">
        <input id="sidebarAudioInput" type="file" accept="audio/*" hidden>
        <button id="sidebarUploadBtn" class="transcript-control-btn">Upload audio</button>
        <button id="sidebarPlayBtn" class="transcript-control-btn" disabled>Play</button>
        <button id="sidebarClearBtn" class="transcript-control-btn">Clear</button>
      </div>

      <div id="transcriptStatus" class="transcript-status">Idle</div>
      <div id="transcriptFileName" class="transcript-file-name"></div>
    </div>

    <div id="transcriptList" class="transcript-list"></div>
  </aside>

  <script type="module" src="{{ url_for('static', filename='app.js') }}"></script>
  <script type="module" src="{{ url_for('static', filename='sidebar-upload.js') }}"></script>
</body>
</html>

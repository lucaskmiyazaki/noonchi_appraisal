<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .login-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
    }
    .login-card {
      width: min(420px, 100%);
      padding: 32px;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
    }
    .login-title {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.1;
    }
    .login-copy {
      margin: 0 0 24px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.5;
    }
    .login-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #111827;
    }
    .login-row {
      display: flex;
      gap: 12px;
    }
    .login-input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 15px;
    }
    .login-button {
      padding: 12px 16px;
      border: 0;
      border-radius: 12px;
      background: #111827;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <form id="loginForm" class="login-card">
      <h1 class="login-title">Open Sessions</h1>
      <p class="login-copy">Enter a user or speaker agent name to view their recorded sessions.</p>
      <label class="login-label" for="userInput">User</label>
      <div class="login-row">
        <input id="userInput" class="login-input" type="text" placeholder="e.g. lucas" autocomplete="username" />
        <button class="login-button" type="submit">Enter</button>
      </div>
    </form>
  </div>
  <script>
    const loginForm = document.getElementById('loginForm');
    const userInput = document.getElementById('userInput');

    loginForm.addEventListener('submit', event => {
      event.preventDefault();
      const user = userInput.value.trim();
      if (!user) {
        userInput.focus();
        return;
      }
      window.location.href = `/${encodeURIComponent(user)}`;
    });

    userInput.focus();
  </script>
</body>
</html>

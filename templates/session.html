<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session Detail</title>
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    html, body { min-height: 100%; overflow-y: auto; }
    .session-layout { position: relative; max-width: 1220px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 24px; align-items: start; }
    .session-main { position: relative; z-index: 1; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 32px; }
    .session-sidebar { position: relative; min-height: 1px; }
    .session-sidebar-panel { position: fixed; top: 24px; right: max(20px, calc((100vw - 1220px) / 2 + 20px)); width: 320px; z-index: 1; background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 20px; max-height: calc(100vh - 48px); overflow: hidden; }
    .reflection-links { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; z-index: 2; }
    .reflection-link-path { fill: none; stroke-width: 2.5; opacity: 0.92; }
    .session-sidebar-title { margin: 0 0 16px; font-size: 16px; font-weight: 700; color: #111827; }
    .session-sidebar-empty { font-size: 13px; color: #6b7280; }
    #reflectionSidebar { overflow: hidden; }
    .session-reflection-list { display: flex; flex-direction: column; gap: 12px; transition: transform 0.18s ease-out; will-change: transform; }
    .session-reflection-item { border-radius: 12px; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(17, 24, 39, 0.06); }
    .session-reflection-card { width: 100%; border: 0; border-radius: 0; padding: 14px; text-align: left; cursor: pointer; background: transparent; }
    .session-reflection-card-title { display: block; font-size: 14px; font-weight: 700; color: #111827; text-transform: capitalize; }
    .session-reflection-card-meta { display: block; margin-top: 6px; font-size: 12px; color: #4b5563; }
    .session-reflection-details[hidden] { display: none; }
    .session-reflection-details { padding: 0 14px 14px; background: rgba(255,255,255,0.72); backdrop-filter: blur(4px); }
    .session-reflection-card-tone { background: #fbcfe8; }
    .session-reflection-card-clarity { background: #fef08a; }
    .session-reflection-card-intensity { background: #bbf7d0; }
    .session-reflection-card-default { background: #e5e7eb; }
    .section-title { font-size: 20px; font-weight: 600; margin-top: 24px; }
    .subtle-line { margin-bottom: 16px; color: #6b7280; font-size: 14px; }
    .back-link { color: #4b5563; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }
    .session-floating-play { position: fixed; top: 120px; left: max(20px, calc((100vw - 1220px) / 2 - 76px)); z-index: 4; }
    .session-play-btn { width: 56px; height: 56px; display: inline-flex; align-items: center; justify-content: center; border: 0; border-radius: 999px; background: #111827; color: #fff; box-shadow: 0 10px 24px rgba(17, 24, 39, 0.18); cursor: pointer; }
    .session-play-btn:hover { background: #1f2937; }
    .session-play-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
    .session-play-btn svg { width: 22px; height: 22px; fill: currentColor; }
    .session-transcript { font-size: 20px; line-height: 1.95; }
    .session-transcript-empty { font-size: 14px; color: #6b7280; }
    .session-chunk { display: inline; padding: 2px 4px; border-radius: 5px; color: #c7cbd1; cursor: pointer; transition: color 0.12s ease, background-color 0.12s ease; }
    .session-chunk.is-read { color: #111827; }
    .session-chunk.is-active { color: #05070b; font-weight: 700; }
    .session-chunk.has-reflection-tone { background: #fbcfe8; }
    .session-chunk.has-reflection-clarity { background: #fef08a; }
    .session-chunk.has-reflection-intensity { background: #bbf7d0; }
    .reflection-modal[hidden] { display: none; }
    .reflection-modal { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 24px; background: rgba(15, 23, 42, 0.45); }
    .reflection-modal-dialog { width: min(560px, 100%); max-height: 80vh; overflow: auto; padding: 24px; border-radius: 16px; background: #fff; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.22); }
    .reflection-modal-header { display: flex; align-items: start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
    .reflection-modal-title { font-size: 18px; font-weight: 700; margin: 0; }
    .reflection-modal-subtitle { margin: 4px 0 0; font-size: 12px; color: #6b7280; }
    .reflection-modal-actions { display: flex; gap: 8px; }
    .reflection-modal-close, .reflection-modal-voice { border: 0; border-radius: 10px; background: #f3f4f6; padding: 8px 10px; cursor: pointer; }
    .reflection-node-text { margin: 0 0 20px; font-size: 15px; line-height: 1.6; color: #111827; white-space: pre-wrap; }
    .reflection-node-word { transition: background-color 0.08s ease, color 0.08s ease; border-radius: 4px; }
    .reflection-node-word.is-read { color: #4b5563; }
    .reflection-node-word.is-current { background: #fef3c7; color: #111827; }
    .reflection-options { display: flex; flex-direction: column; gap: 10px; }
    .reflection-option { width: 100%; text-align: left; padding: 12px 14px; border: 1px solid #dbe3ff; border-radius: 12px; background: #f8faff; cursor: pointer; }
    .reflection-option:hover { background: #eef2ff; }
    .reflection-option:disabled { opacity: 0.72; cursor: default; }
    .reflection-option.is-selected { background: #e0e7ff; border-color: #a5b4fc; }
    .reflection-option-label { display: block; font-size: 14px; font-weight: 600; color: #111827; }
    .reflection-terminal { padding: 12px 14px; border-radius: 12px; background: #f9fafb; color: #4b5563; font-size: 13px; }
    .reflection-node-entry + .reflection-node-entry { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(148, 163, 184, 0.25); }

    @media (max-width: 980px) {
      .session-layout { grid-template-columns: 1fr; }
      .session-sidebar { position: static; }
      .session-sidebar-panel { position: static; width: auto; max-height: none; overflow: visible; }
      .session-floating-play { left: 20px; top: 24px; }
      .reflection-links { display: none; }
    }
  </style>
</head>
{% set resolved_user = current_user or '' %}
{% set resolved_session = current_session or '' %}
<body data-current-user="{{ resolved_user }}" data-current-session="{{ resolved_session }}">
  <div class="session-layout">
    <svg id="reflectionLinks" class="reflection-links" aria-hidden="true"></svg>
    <div class="session-floating-play">
      <button id="playBtn" class="session-play-btn" type="button" aria-label="Play audio" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5.5v13l10-6.5z"></path></svg>
      </button>
    </div>
    <div class="session-main">
      <a class="back-link" href="/{{ resolved_user|urlencode }}">Back to sessions</a>
      <h1>User Reflection Sessions</h1>
      <div class="subtle-line">Viewing session <strong>{{ resolved_session }}</strong> for <strong>{{ resolved_user }}</strong></div>
      <div id="waveformContainer" style="margin:24px 0;"></div>
    </div>
    <aside class="session-sidebar">
      <div class="session-sidebar-panel">
        <h2 class="session-sidebar-title">Reflections</h2>
        <div id="reflectionSidebar"></div>
      </div>
    </aside>
  </div>
  <div id="reflectionModal" class="reflection-modal" hidden>
    <div class="reflection-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="reflectionModalTitle">
      <div class="reflection-modal-header">
        <div>
          <h2 id="reflectionModalTitle" class="reflection-modal-title">Reflection Tree</h2>
          <p id="reflectionModalSubtitle" class="reflection-modal-subtitle"></p>
        </div>
        <div class="reflection-modal-actions">
          <button id="reflectionModalVoice" class="reflection-modal-voice" type="button">Replay voice</button>
          <button id="reflectionModalClose" class="reflection-modal-close" type="button">Close</button>
        </div>
      </div>
      <div id="reflectionModalBody"></div>
    </div>
  </div>
  <script>
    const waveformContainer = document.getElementById('waveformContainer');
    const reflectionSidebar = document.getElementById('reflectionSidebar');
    const reflectionLinks = document.getElementById('reflectionLinks');
    const sessionLayout = document.querySelector('.session-layout');
    const currentUser = document.body.dataset.currentUser || '';
    const currentSession = document.body.dataset.currentSession || '';
    const reflectionModal = document.getElementById('reflectionModal');
    const reflectionModalTitle = document.getElementById('reflectionModalTitle');
    const reflectionModalSubtitle = document.getElementById('reflectionModalSubtitle');
    const reflectionModalBody = document.getElementById('reflectionModalBody');
    const reflectionModalVoice = document.getElementById('reflectionModalVoice');
    const reflectionModalClose = document.getElementById('reflectionModalClose');
    let activeReflectionState = null;
    let activeUtterance = null;
    let pendingLinkFrame = null;
    let scheduleReflectionLinkDraw = () => {};
    const speechSupported = typeof window !== 'undefined' && 'speechSynthesis' in window && typeof SpeechSynthesisUtterance !== 'undefined';

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function closeActiveReflection() {
      if (speechSupported) {
        window.speechSynthesis.cancel();
      }

      if (activeReflectionState?.bodyElement) {
        activeReflectionState.bodyElement.innerHTML = '';
      }

      if (activeReflectionState?.detailsElement) {
        activeReflectionState.detailsElement.hidden = true;
      }

      if (activeReflectionState?.cardButton) {
        activeReflectionState.cardButton.setAttribute('aria-expanded', 'false');
      }

      reflectionModal.hidden = true;
      reflectionModalBody.innerHTML = '';
      activeReflectionState = null;
      activeUtterance = null;
      scheduleReflectionLinkDraw();
    }

    function renderReadAlongText(text) {
      const tokens = String(text || '').match(/\S+|\s+/g) || [];
      let charIndex = 0;

      return tokens.map(token => {
        const start = charIndex;
        charIndex += token.length;
        if (/^\s+$/.test(token)) {
          return escapeHtml(token);
        }
        return `<span class="reflection-node-word" data-start="${start}" data-end="${charIndex}">${escapeHtml(token)}</span>`;
      }).join('');
    }

    function updateReadAlong(container, charIndex, markComplete = false) {
      const words = container?.querySelectorAll('.reflection-node-word') || [];
      words.forEach(word => {
        const start = Number(word.dataset.start);
        const end = Number(word.dataset.end);
        const isRead = markComplete || end <= charIndex;
        const isCurrent = !markComplete && charIndex >= start && charIndex < end;
        word.classList.toggle('is-read', isRead);
        word.classList.toggle('is-current', isCurrent);
      });
    }

    function speakNodeText(text, container = activeReflectionState?.currentEntryElement || activeReflectionState?.bodyElement) {
      if (!speechSupported || !text || !container) {
        return;
      }

      window.speechSynthesis.cancel();
      updateReadAlong(container, 0, false);

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.96;
      utterance.pitch = 1;
      utterance.onboundary = event => {
        if (event.name === 'word' || typeof event.charIndex === 'number') {
          updateReadAlong(container, event.charIndex, false);
        }
      };
      utterance.onend = () => {
        updateReadAlong(container, text.length, true);
        activeUtterance = null;
      };
      utterance.onerror = () => {
        activeUtterance = null;
      };

      activeUtterance = utterance;
      window.speechSynthesis.speak(utterance);
    }

    function renderActiveReflectionNode() {
      if (!activeReflectionState) {
        closeActiveReflection();
        return;
      }

      const { reflection, tree, currentNodeId, bodyElement } = activeReflectionState;
      const node = tree?.nodes?.[currentNodeId];
      if (!node) {
        bodyElement.innerHTML = '<div class="reflection-terminal">This reflection node could not be loaded.</div>';
        return;
      }

      const options = Array.isArray(node.options) ? node.options : [];
      const nodeText = String(node.text || '');
      const entryElement = document.createElement('div');
      entryElement.className = 'reflection-node-entry';
      entryElement.dataset.nodeId = currentNodeId;
      entryElement.innerHTML = `
        <p class="reflection-node-text">${renderReadAlongText(nodeText)}</p>
        <div class="reflection-options">
          ${options.length ? options.map((option, index) => {
            const label = option.label || option.value || `Option ${index + 1}`;
            const next = option.next || '';
            return `<button class="reflection-option" type="button" data-next="${escapeHtml(next)}"><span class="reflection-option-label">${escapeHtml(label)}</span></button>`;
          }).join('') : '<div class="reflection-terminal">No further options for this node.</div>'}
        </div>
      `;
      bodyElement.appendChild(entryElement);
      activeReflectionState.currentEntryElement = entryElement;

      entryElement.querySelectorAll('.reflection-option').forEach(button => {
        button.addEventListener('click', () => {
          const optionButtons = entryElement.querySelectorAll('.reflection-option');
          optionButtons.forEach(optionButton => {
            optionButton.disabled = true;
            optionButton.classList.toggle('is-selected', optionButton === button);
          });

          const nextNodeId = button.dataset.next;
          if (!nextNodeId || !tree?.nodes?.[nextNodeId]) {
            return;
          }

          activeReflectionState.currentNodeId = nextNodeId;
          renderActiveReflectionNode();
        });
      });

      updateReadAlong(entryElement, 0, false);
      speakNodeText(nodeText, entryElement);
      scheduleReflectionLinkDraw();
    }

    function openReflectionInline(reflection) {
      const tree = reflection.tree;
      const startNodeId = tree?.start_node;
      if (!tree || !startNodeId || !tree.nodes?.[startNodeId]) {
        return;
      }

      const detailsElement = reflectionSidebar.querySelector(`[data-reflection-details-key="${CSS.escape(reflection.reflectionKey)}"]`);
      const bodyElement = detailsElement?.querySelector('[data-reflection-body]');
      const cardButton = reflectionSidebar.querySelector(`[data-reflection-key="${CSS.escape(reflection.reflectionKey)}"]`);
      if (!detailsElement || !bodyElement || !cardButton) {
        return;
      }

      if (activeReflectionState?.reflection?.reflectionKey === reflection.reflectionKey) {
        closeActiveReflection();
        return;
      }

      closeActiveReflection();
      detailsElement.hidden = false;
      bodyElement.innerHTML = '';
      cardButton.setAttribute('aria-expanded', 'true');
      activeReflectionState = { reflection, tree, currentNodeId: startNodeId, detailsElement, bodyElement, cardButton };
      renderActiveReflectionNode();
    }

    reflectionModalClose.addEventListener('click', closeActiveReflection);
    reflectionModalVoice.addEventListener('click', () => {
      if (!activeReflectionState) {
        return;
      }
      const node = activeReflectionState.tree?.nodes?.[activeReflectionState.currentNodeId];
      speakNodeText(String(node?.text || ''));
    });
    reflectionModal.addEventListener('click', event => {
      if (event.target === reflectionModal) {
        closeActiveReflection();
      }
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && activeReflectionState) {
        closeActiveReflection();
      }
    });

    async function loadSession() {
      waveformContainer.innerHTML = '';
      const user = currentUser.trim();
      const session = currentSession.trim();
      if (!user || !session) {
        waveformContainer.innerHTML = '<div>Missing user or session.</div>';
        return;
      }

      let audioUrl = '';
      let transcriptSegments = [];
      try {
        const latestAudioResponse = await fetch(`/api/audio/latest?session_name=${encodeURIComponent(session)}`);
        if (latestAudioResponse.ok) {
          const latestAudio = await latestAudioResponse.json();
          if (latestAudio?.id) {
            const audioResponse = await fetch(`/api/audio/${encodeURIComponent(latestAudio.id)}`);
            if (audioResponse.ok) {
              const audioRecord = await audioResponse.json();
              audioUrl = audioRecord.audioUrl || '';
              transcriptSegments = Array.isArray(audioRecord.transcript) ? audioRecord.transcript : [];
            }
          }
        }
      } catch (error) {
        console.warn('Failed to load audio record for session', session, error);
      }

      const reflectionsResponse = await fetch(`/reflection/${encodeURIComponent(user)}/${encodeURIComponent(session)}`);
      const reflectionData = await reflectionsResponse.json();
      const reflections = reflectionData.reflections || [];

      function getReflectionHighlightClass(reflectionType) {
        const normalizedType = String(reflectionType || '').trim().toLowerCase();

        if (normalizedType === 'incoherent tone') {
          return 'has-reflection-tone';
        }

        if (normalizedType === 'unclear feedback' || normalizedType === 'unclear concern') {
          return 'has-reflection-clarity';
        }

        if (normalizedType === 'incoherent intensity') {
          return 'has-reflection-intensity';
        }

        return '';
      }

      function getReflectionCardClass(reflectionType) {
        const highlightClass = getReflectionHighlightClass(reflectionType);
        if (highlightClass === 'has-reflection-tone') return 'session-reflection-card-tone';
        if (highlightClass === 'has-reflection-clarity') return 'session-reflection-card-clarity';
        if (highlightClass === 'has-reflection-intensity') return 'session-reflection-card-intensity';
        return 'session-reflection-card-default';
      }

      function getReflectionStroke(reflectionType) {
        const highlightClass = getReflectionHighlightClass(reflectionType);
        if (highlightClass === 'has-reflection-tone') return { color: '#ec4899', markerId: 'arrow-tone' };
        if (highlightClass === 'has-reflection-clarity') return { color: '#ca8a04', markerId: 'arrow-clarity' };
        if (highlightClass === 'has-reflection-intensity') return { color: '#16a34a', markerId: 'arrow-intensity' };
        return { color: '#6b7280', markerId: 'arrow-default' };
      }

      function formatReflectionTime(msValue) {
        const totalMs = Number(msValue);
        if (!Number.isFinite(totalMs) || totalMs < 0) {
          return '--:--';
        }

        const totalSeconds = Math.floor(totalMs / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${minutes}:${String(seconds).padStart(2, '0')}`;
      }

      const reflectionsWithTypes = await Promise.all(reflections.map(async (reflection, index) => {
        const nextReflection = {
          ...reflection,
          reflectionKey: reflection.reflection_tree_file || `reflection-${index + 1}`,
          tree_id: null,
          reflectionType: '',
          tree: null,
        };
        if (!reflection.reflection_tree_file) {
          return nextReflection;
        }
        try {
          const treeResponse = await fetch(`/reflection_tree/${encodeURIComponent(reflection.reflection_tree_file)}`);
          if (!treeResponse.ok) {
            return nextReflection;
          }
          const treeData = await treeResponse.json();
          nextReflection.tree = treeData;
          nextReflection.tree_id = treeData.tree_id || null;
          nextReflection.reflectionType = treeData.type || '';
        } catch (error) {
          console.warn('Failed to load reflection tree', reflection.reflection_tree_file, error);
        }
        return nextReflection;
      }));

      scheduleReflectionLinkDraw = function scheduleReflectionLinkDrawImpl() {
        if (pendingLinkFrame !== null) {
          cancelAnimationFrame(pendingLinkFrame);
        }

        pendingLinkFrame = window.requestAnimationFrame(() => {
          pendingLinkFrame = null;
          drawReflectionLinks();
        });
      };

      function getReflectionAnchorChunkNode(reflection) {
        const chunkNodes = Array.from(document.querySelectorAll(`[data-reflection-key="${CSS.escape(reflection.reflectionKey)}"]`));
        return chunkNodes[0] || null;
      }

      function syncReflectionSidebarStepOffset() {
        const list = reflectionSidebar.querySelector('.session-reflection-list');
        if (!list || window.innerWidth <= 980) {
          if (list) {
            list.style.transform = '';
          }
          return;
        }

        const listStyle = window.getComputedStyle(list);
        const cardGap = Number.parseFloat(listStyle.rowGap || listStyle.gap || '0') || 0;
        const passedThreshold = 24;
        let offsetY = 0;

        reflectionsWithTypes.forEach((reflection) => {
          const anchorChunkNode = getReflectionAnchorChunkNode(reflection);
          const cardNode = list.querySelector(`[data-reflection-key="${CSS.escape(reflection.reflectionKey)}"]`);
          const itemNode = cardNode?.closest('.session-reflection-item');

          if (!anchorChunkNode || !cardNode || !itemNode) {
            return;
          }

          const chunkRect = anchorChunkNode.getBoundingClientRect();
          if (chunkRect.bottom <= passedThreshold) {
            offsetY += itemNode.getBoundingClientRect().height + cardGap;
          }
        });

        list.style.transform = offsetY > 0 ? `translateY(${-offsetY}px)` : '';
      }

      function drawReflectionLinks() {
        if (!reflectionLinks || !sessionLayout || window.innerWidth <= 980) {
          return;
        }

        syncReflectionSidebarStepOffset();

        const layoutRect = sessionLayout.getBoundingClientRect();
        const layoutWidth = Math.max(1, sessionLayout.scrollWidth);
        const layoutHeight = Math.max(1, sessionLayout.scrollHeight);

        reflectionLinks.setAttribute('viewBox', `0 0 ${layoutWidth} ${layoutHeight}`);
        reflectionLinks.setAttribute('width', String(layoutWidth));
        reflectionLinks.setAttribute('height', String(layoutHeight));
        reflectionLinks.innerHTML = `
          <defs>
            <marker id="arrow-tone" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L9,3 z" fill="#ec4899"></path>
            </marker>
            <marker id="arrow-clarity" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L9,3 z" fill="#ca8a04"></path>
            </marker>
            <marker id="arrow-intensity" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"></path>
            </marker>
            <marker id="arrow-default" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"></path>
            </marker>
          </defs>
        `;

        reflectionsWithTypes.forEach((reflection) => {
          const cardNode = reflectionSidebar.querySelector(`[data-reflection-key="${CSS.escape(reflection.reflectionKey)}"]`);
          const anchorChunkNode = getReflectionAnchorChunkNode(reflection);

          if (!anchorChunkNode || !cardNode) {
            return;
          }

          const stroke = getReflectionStroke(reflection.reflectionType);
          const cardRect = cardNode.getBoundingClientRect();
          const targetX = cardRect.left - layoutRect.left;
          const targetY = cardRect.top - layoutRect.top + (cardRect.height / 2);

          const chunkRect = anchorChunkNode.getBoundingClientRect();
          const startX = chunkRect.right - layoutRect.left;
          const startY = chunkRect.top - layoutRect.top + (chunkRect.height / 2);
          const distance = Math.max(60, (targetX - startX) * 0.45);
          const controlX1 = startX + distance;
          const controlX2 = targetX - distance;
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('class', 'reflection-link-path');
          path.setAttribute('stroke', stroke.color);
          path.setAttribute('marker-end', `url(#${stroke.markerId})`);
          path.setAttribute('d', `M ${startX} ${startY} C ${controlX1} ${startY}, ${controlX2} ${targetY}, ${targetX} ${targetY}`);
          reflectionLinks.appendChild(path);
        });
      }

      function renderReflectionSidebar() {
        if (!reflectionsWithTypes.length) {
          reflectionSidebar.innerHTML = '<div class="session-sidebar-empty">No reflections for this session.</div>';
          scheduleReflectionLinkDraw();
          return;
        }

        const list = document.createElement('div');
        list.className = 'session-reflection-list';

        reflectionsWithTypes.forEach((reflection, index) => {
          const item = document.createElement('div');
          item.className = `session-reflection-item ${getReflectionCardClass(reflection.reflectionType)}`;

          const card = document.createElement('button');
          card.type = 'button';
          card.className = 'session-reflection-card';
          card.dataset.reflectionKey = reflection.reflectionKey;
          card.setAttribute('aria-expanded', 'false');

          const title = document.createElement('span');
          title.className = 'session-reflection-card-title';
          title.textContent = reflection.reflectionType || `reflection ${index + 1}`;

          const meta = document.createElement('span');
          meta.className = 'session-reflection-card-meta';
          meta.textContent = `${formatReflectionTime(reflection.startms)} - ${formatReflectionTime(reflection.endms)}`;

          card.appendChild(title);
          card.appendChild(meta);
          card.addEventListener('click', () => {
            if (reflection.tree) {
              openReflectionInline(reflection);
            }
          });

          const details = document.createElement('div');
          details.className = 'session-reflection-details';
          details.dataset.reflectionDetailsKey = reflection.reflectionKey;
          details.hidden = true;

          const body = document.createElement('div');
          body.dataset.reflectionBody = 'true';
          details.appendChild(body);

          item.appendChild(card);
          item.appendChild(details);
          list.appendChild(item);
        });

        reflectionSidebar.innerHTML = '';
        reflectionSidebar.appendChild(list);
        scheduleReflectionLinkDraw();
      }

      waveformContainer.innerHTML = `
        <div class="section-title">Audio</div>
        <div id="sessionTranscript" class="session-transcript"></div>
      `;

      const sessionTranscript = document.getElementById('sessionTranscript');
      const audio = new Audio(audioUrl);
      audio.preload = 'metadata';

      let activeChunkId = null;

      function findReflectionAtTime(timeInSeconds) {
        return reflectionsWithTypes.find(reflection => {
          const start = Number(reflection.startms) / 1000;
          const end = Number(reflection.endms) / 1000;
          return Number.isFinite(start) && Number.isFinite(end) && timeInSeconds >= start && timeInSeconds <= end;
        }) || null;
      }

      function findReflectionForChunk(chunk) {
        const chunkStart = Number(chunk?.start);
        const chunkEnd = Number(chunk?.end);
        if (!Number.isFinite(chunkStart) || !Number.isFinite(chunkEnd)) {
          return null;
        }

        return reflectionsWithTypes.find((reflection) => {
          const start = Number(reflection.startms) / 1000;
          const end = Number(reflection.endms) / 1000;
          return Number.isFinite(start) && Number.isFinite(end) && chunkEnd > start && chunkStart < end;
        }) || null;
      }

      function renderTranscript() {
        if (!transcriptSegments.length) {
          sessionTranscript.innerHTML = '<div class="session-transcript-empty">Transcript unavailable for this session.</div>';
          return;
        }

        sessionTranscript.innerHTML = '';
        transcriptSegments.forEach((chunk) => {
          const span = document.createElement('span');
          const reflection = findReflectionForChunk(chunk);
          const reflectionClass = getReflectionHighlightClass(reflection?.reflectionType);
          const chunkStart = Number(chunk.start);
          const chunkEnd = Number(chunk.end);
          const isRead = Number.isFinite(chunkEnd) && audio.currentTime >= chunkEnd;
          const isActive = chunk.id === activeChunkId;

          span.className = 'session-chunk';
          if (reflectionClass) span.classList.add(reflectionClass);
          if (reflection?.reflectionKey) span.dataset.reflectionKey = reflection.reflectionKey;
          if (isRead) span.classList.add('is-read');
          if (isActive) span.classList.add('is-active');
          span.textContent = `${chunk.text || ''} `;

          span.addEventListener('click', () => {
            if (Number.isFinite(chunkStart)) {
              audio.currentTime = chunkStart;
            }
            activeChunkId = chunk.id;
            renderTranscript();
            if (reflection?.tree) {
              openReflectionInline(reflection);
            }
          });

          sessionTranscript.appendChild(span);
        });

        scheduleReflectionLinkDraw();
      }

      function syncActiveChunk() {
        const nextActiveChunk = transcriptSegments.find((chunk) => {
          const start = Number(chunk.start);
          const end = Number(chunk.end);
          return Number.isFinite(start) && Number.isFinite(end) && audio.currentTime >= start && audio.currentTime < end;
        });

        const nextActiveId = nextActiveChunk?.id || null;
        if (nextActiveId !== activeChunkId) {
          activeChunkId = nextActiveId;
          renderTranscript();
          return;
        }

        if (nextActiveId !== null) {
          renderTranscript();
        }
      }

      playBtn.onclick = async () => {
        if (!audioUrl) {
          return;
        }
        if (audio.paused) {
          try {
            await audio.play();
          } catch (error) {
            console.error('Failed to play audio', error);
          }
        } else {
          audio.pause();
        }
      };

      function renderPlayButtonIcon(isPlaying) {
        playBtn.innerHTML = isPlaying
          ? '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 5h4v14H7zm6 0h4v14h-4z"></path></svg>'
          : '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5.5v13l10-6.5z"></path></svg>';
        playBtn.setAttribute('aria-label', isPlaying ? 'Pause audio' : 'Play audio');
      }

      audio.onplay = () => { renderPlayButtonIcon(true); };
      audio.onpause = () => { renderPlayButtonIcon(false); };
      audio.ontimeupdate = syncActiveChunk;
      audio.onended = () => {
        renderPlayButtonIcon(false);
        activeChunkId = null;
        renderTranscript();
      };

      window.addEventListener('resize', scheduleReflectionLinkDraw);
      window.addEventListener('scroll', scheduleReflectionLinkDraw, { passive: true });

      playBtn.disabled = !audioUrl;
      renderPlayButtonIcon(false);
      renderReflectionSidebar();
      renderTranscript();
    }

    loadSession();
  </script>
</body>
</html>
